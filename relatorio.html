<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Doações - SBE</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- jsPDF para gerar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 30px 20px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-left: 4px solid;
        }

        .card.total {
            border-color: #4caf50;
        }

        .card.mes {
            border-color: #2196f3;
        }

        .card.quantidade {
            border-color: #ff9800;
        }

        .card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .valor {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            margin: 10px 0;
        }

        .card.total .valor {
            color: #4caf50;
        }

        .card.mes .valor {
            color: #2196f3;
        }

        .card.quantidade .valor {
            color: #ff9800;
        }

        .lista-doacoes {
            list-style: none;
        }

        .doacao-item {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #4a90e2;
        }

        .doacao-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .doacao-numero {
            font-weight: 700;
            color: #4a90e2;
        }

        .doacao-data {
            color: #999;
            font-size: 0.9em;
        }

        .doacao-doador {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
            margin: 8px 0;
        }

        .doacao-tipo {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 5px;
        }

        .tipo-valor {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .tipo-pix {
            background: #b3e5fc;
            color: #01579b;
        }

        .tipo-cesta {
            background: #ffe0b2;
            color: #e65100;
        }

        .doacao-valor {
            font-size: 1.3em;
            font-weight: 700;
            color: #2e7d32;
            margin: 10px 0;
        }

        .btn-voltar {
            display: inline-block;
            padding: 12px 30px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: #555;
        }

        .section-title {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a90e2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }

        .filtro-mes {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filtro-mes label {
            font-weight: 600;
            color: #555;
        }

        .filtro-mes select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }

        .btn-pdf {
            padding: 12px 25px;
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(229, 57, 53, 0.3);
            transition: all 0.3s;
        }

        .btn-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4);
        }

        .btn-pdf:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-pdf-parcial {
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: all 0.3s;
        }

        .btn-pdf-parcial:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .btn-pdf-parcial:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .filtro-mes {
                flex-direction: column;
                align-items: stretch;
            }

            .filtro-mes select,
            .btn-pdf {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Relatório de Doações - SBE</h1>
            <div class="subtitle">Sociedade Beneficente Evangélica - IEAD Coophamil</div>
        </div>

        <div class="content">
            <a href="index.html" class="btn-voltar">← Voltar para Registro</a>

            <!-- Filtro de Mês e Geração de PDF -->
            <div class="filtro-mes">
                <label for="mesSelect">📅 Selecionar Mês:</label>
                <select id="mesSelect" onchange="atualizarRelatorioMes()">
                    <option value="">Selecione o mês</option>
                </select>
                <select id="anoSelect" onchange="atualizarRelatorioMes()">
                    <option value="">Selecione o Ano</option>
                </select>
                <button class="btn-pdf-parcial" id="btnGerarPDFParcial" onclick="gerarPDF(true)" disabled style="display:none;">
                    📊 Relatório Parcial
                </button>
                <button class="btn-pdf" id="btnGerarPDF" onclick="gerarPDF(false)" disabled>
                    📄 Relatório Completo
                </button>
            </div>

            <!-- Cards de Estatísticas -->
            <div class="cards-container">
                <div class="card total">
                    <h3>Total Arrecadado em 2026</h3>
                    <div class="valor" id="totalGeral">R$ 0,00</div>
                </div>

                <div class="card mes">
                    <h3>Total deste Mês</h3>
                    <div class="valor" id="totalMes">R$ 0,00</div>
                </div>

                <div class="card quantidade">
                    <h3>Número de Doações</h3>
                    <div class="valor" id="totalDoacoes">0</div>
                </div>
            </div>

            <!-- Lista de Doações -->
            <h2 class="section-title">📋 Histórico Completo de Doações</h2>
            <div id="loadingDoacoes" class="loading">Carregando doações...</div>
            <ul class="lista-doacoes" id="listaDoacoes"></ul>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://fwmlimudntlrkeukvyjg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gx8_WdV2x6n9FoZooniJCQ_s0hWGsiW';
        const supabaseDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let doacoes = [];

        // Carregar doações do Supabase
        async function carregarDoacoes() {
            const loadingEl = document.getElementById('loadingDoacoes');
            loadingEl.style.display = 'block';

            try {
                const { data, error } = await supabaseDB
                    .from('doacoes_sbe')
                    .select('*')
                    .order('numero_recibo', { ascending: true });

                if (!error && data) {
                    doacoes = data;
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }

            loadingEl.style.display = 'none';
            atualizarEstatisticas();
            renderizarDoacoes();
        }

        function atualizarEstatisticas() {
            const anoAtual = new Date().getFullYear();
            const mesAtual = new Date().getMonth() + 1;

            const totalGeral = doacoes
                .filter(d => d.ano === anoAtual)
                .reduce((sum, d) => sum + (parseFloat(d.valor) || 0), 0);

            const totalMes = doacoes
                .filter(d => d.ano === anoAtual && d.mes === mesAtual)
                .reduce((sum, d) => sum + (parseFloat(d.valor) || 0), 0);

            document.getElementById('totalGeral').textContent = 'R$ ' + totalGeral.toFixed(2).replace('.', ',');
            document.getElementById('totalMes').textContent = 'R$ ' + totalMes.toFixed(2).replace('.', ',');
            document.getElementById('totalDoacoes').textContent = doacoes.filter(d => d.ano === anoAtual).length;
        }

        function renderizarDoacoes() {
            const listaDoacoes = document.getElementById('listaDoacoes');

            if (doacoes.length === 0) {
                listaDoacoes.innerHTML = '<li style="text-align: center; padding: 40px; color: #999;">Nenhuma doação registrada ainda.</li>';
                return;
            }

            listaDoacoes.innerHTML = '';

            doacoes.forEach(doacao => {
                const li = document.createElement('li');
                li.className = 'doacao-item';

                const data = new Date(doacao.criado_em).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const tipoLabel = {
                    'valor': 'Valor',
                    'pix': 'PIX',
                    'cesta_basica': 'Cesta Básica'
                }[doacao.tipo_doacao];

                const tipoClass = {
                    'valor': 'tipo-valor',
                    'pix': 'tipo-pix',
                    'cesta_basica': 'tipo-cesta'
                }[doacao.tipo_doacao];

                let valorDisplay = '';
                if (doacao.tipo_doacao === 'cesta_basica') {
                    valorDisplay = `${doacao.quantidade} Cesta${doacao.quantidade > 1 ? 's' : ''}`;
                } else {
                    valorDisplay = `R$ ${parseFloat(doacao.valor || 0).toFixed(2).replace('.', ',')}`;
                }

                li.innerHTML = `
                    <div class="doacao-header">
                        <div class="doacao-numero">Doação #${doacao.id}</div>
                        <div class="doacao-data">${data}</div>
                    </div>
                    <div class="doacao-doador">${doacao.doador_nome}</div>
                    <span class="doacao-tipo ${tipoClass}">${tipoLabel}</span>
                    <div class="doacao-valor">${valorDisplay}</div>
                    ${doacao.referente_a ? `<div style="color: #666; margin: 5px 0;"><em>${doacao.referente_a}</em></div>` : ''}
                    ${doacao.observacao ? `<div style="color: #666; margin: 5px 0; font-size: 0.9em;">Obs: ${doacao.observacao}</div>` : ''}
                    ${doacao.imagem_comprovante ? `<div style="margin-top: 10px;"><img src="${doacao.imagem_comprovante}" style="max-width: 200px; border-radius: 5px; border: 1px solid #ddd;"></div>` : ''}
                `;

                listaDoacoes.appendChild(li);
            });
        }

        // Preencher seletores de mês e ano
        function preencherSeletores() {
            const mesSelect = document.getElementById('mesSelect');
            const anoSelect = document.getElementById('anoSelect');

            // Preencher meses
            const meses = [
                'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
            ];

            meses.forEach((mes, index) => {
                const option = document.createElement('option');
                option.value = index + 1;
                option.textContent = mes;
                mesSelect.appendChild(option);
            });

            // Preencher anos (de 2026 em diante)
            const anoAtual = new Date().getFullYear();
            const anoInicio = 2026;
            for (let ano = anoAtual; ano >= anoInicio; ano--) {
                const option = document.createElement('option');
                option.value = ano;
                option.textContent = ano;
                anoSelect.appendChild(option);
            }

            // NÃO selecionar automaticamente - usuário deve escolher
            // const mesAtual = new Date().getMonth() + 1;
            // mesSelect.value = mesAtual;
            // anoSelect.value = anoAtual;
        }

        function atualizarRelatorioMes() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoSelect').value);
            const btnPDF = document.getElementById('btnGerarPDF');
            const btnPDFParcial = document.getElementById('btnGerarPDFParcial');

            if (mes && ano) {
                const dataAtual = new Date();
                const mesAtual = dataAtual.getMonth() + 1;
                const anoAtual = dataAtual.getFullYear();
                const mesFechado = (ano < anoAtual) || (ano === anoAtual && mes < mesAtual);

                // Botão de relatório completo (vermelho)
                // Só habilitado para mês FECHADO
                if (mesFechado) {
                    btnPDF.disabled = false;
                    btnPDF.textContent = `📄 Relatório Completo - ${getNomeMes(mes)}/${ano}`;
                } else {
                    // Mês em curso - botão desabilitado/esmaecido
                    btnPDF.disabled = true;
                    btnPDF.textContent = `📄 Relatório do Mês - ${getNomeMes(mes)}/${ano}`;
                }

                // Botão de relatório parcial (laranja)
                // Só para mês em curso (não fechado)
                if (!mesFechado && ano === anoAtual && mes === mesAtual) {
                    btnPDFParcial.style.display = 'inline-block';
                    btnPDFParcial.disabled = false;
                    btnPDFParcial.textContent = `📊 Relatório Parcial - ${getNomeMes(mes)}/${ano}`;
                } else {
                    // Mês fechado - esconder botão parcial
                    btnPDFParcial.style.display = 'none';
                }
            } else {
                btnPDF.disabled = true;
                btnPDF.textContent = '📄 Relatório Completo';
                btnPDFParcial.style.display = 'none';
            }
        }

        function getNomeMes(mes) {
            const meses = [
                'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
            ];
            return meses[parseInt(mes) - 1];
        }

        async function gerarPDF(parcial = false) {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoSelect').value);

            if (!mes || !ano) {
                alert('⚠️ Selecione o mês e ano para gerar o relatório!');
                return;
            }

            // Validar se pode gerar o relatório
            const dataAtual = new Date();
            const mesAtual = dataAtual.getMonth() + 1;
            const anoAtual = dataAtual.getFullYear();
            const mesFechado = (ano < anoAtual) || (ano === anoAtual && mes < mesAtual);

            if (!parcial && !mesFechado) {
                alert('⚠️ O mês ainda está em curso! Use o botão "Relatório Parcial" para gerar o relatório atual.');
                return;
            }

            if (parcial && mesFechado) {
                alert('⚠️ Este mês já está fechado! Use o botão "Relatório Completo".');
                return;
            }

            // Filtrar doações do mês
            const doacoesMes = doacoes.filter(d => d.mes === mes && d.ano === ano);

            if (doacoesMes.length === 0) {
                alert('⚠️ Não há doações registradas neste mês!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Calcular período do relatório parcial
            const primeiroDiaMes = new Date(ano, mes - 1, 1);
            const dataInicioFormatada = primeiroDiaMes.toLocaleDateString('pt-BR');
            const dataFimFormatada = dataAtual.toLocaleDateString('pt-BR');
            const horaAtual = dataAtual.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            // Cabeçalho
            doc.setFontSize(18);
            doc.setFont(undefined, 'bold');
            doc.text('Relatório de Doações - SBE', 105, 15, { align: 'center' });

            doc.setFontSize(11);
            doc.setFont(undefined, 'normal');
            doc.text('Sociedade Beneficente Evangélica', 105, 22, { align: 'center' });
            doc.text('IEAD Coophamil', 105, 28, { align: 'center' });

            // Status do mês
            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            let statusTexto;
            if (parcial && !mesFechado) {
                statusTexto = `***Relatório Parcial de ${dataInicioFormatada} a ${dataFimFormatada} ${horaAtual}***`;
            } else if (mesFechado) {
                statusTexto = `Relatório mês fechado ${String(mes).padStart(2, '0')}/${ano}`;
            } else {
                statusTexto = `Relatório completo - ${getNomeMes(mes)}/${ano}`;
            }
            doc.text(statusTexto, 105, 38, { align: 'center' });

            // Data de geração
            doc.setFontSize(9);
            doc.setFont(undefined, 'normal');
            doc.text(`Gerado em: ${dataAtual.toLocaleDateString('pt-BR')} às ${dataAtual.toLocaleTimeString('pt-BR')}`, 105, 44, { align: 'center' });

            // Linha separadora
            doc.setLineWidth(0.5);
            doc.line(15, 48, 195, 48);

            let yPos = 55;

            // Separar doações por tipo (CESTAS NÃO ENTRAM NO TOTAL DE VALORES)
            const doacoesDinheiro = doacoesMes.filter(d => d.tipo_doacao === 'valor' || d.tipo_doacao === 'pix');
            const doacoesCestas = doacoesMes.filter(d => d.tipo_doacao === 'cesta_basica');

            // Totalizadores (CESTAS SEPARADAS)
            const totalDinheiro = doacoesDinheiro.reduce((sum, d) => sum + (parseFloat(d.valor) || 0), 0);
            const totalCestas = doacoesCestas.reduce((sum, d) => sum + (parseInt(d.quantidade) || 0), 0);

            // Seção: Doações em Dinheiro/PIX
            if (doacoesDinheiro.length > 0) {
                doc.setFontSize(13);
                doc.setFont(undefined, 'bold');
                doc.text('DOACOES EM DINHEIRO E PIX', 15, yPos);
                yPos += 8;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');

                doacoesDinheiro.forEach((doacao, index) => {
                    if (yPos > 270) { // Nova página
                        doc.addPage();
                        yPos = 20;
                    }

                    const tipoLabel = doacao.tipo_doacao === 'pix' ? 'PIX' : 'Dinheiro';
                    const valor = `R$ ${parseFloat(doacao.valor || 0).toFixed(2).replace('.', ',')}`;
                    
                    // Nome do doador com pontos até o valor
                    const nome = `${index + 1}. ${doacao.doador_nome}`;
                    const tipoValor = `${tipoLabel} - ${valor}`;
                    
                    // Calcular espaço disponível e preencher com pontos
                    const espacoDisponivel = 110; // espaço entre nome e valor
                    const pontilhado = '.'.repeat(Math.max(0, Math.floor((espacoDisponivel - doc.getTextWidth(nome)) / doc.getTextWidth('.'))));
                    
                    doc.text(`${nome} ${pontilhado} ${tipoValor}`, 18, yPos);
                    yPos += 5;

                    if (doacao.referente_a) {
                        doc.setFont(undefined, 'italic');
                        doc.text(`   Ref: ${doacao.referente_a}`, 20, yPos);
                        doc.setFont(undefined, 'normal');
                        yPos += 5;
                    }
                });

                yPos += 3;
                doc.setFont(undefined, 'bold');
                doc.text(`Total em Dinheiro/PIX: R$ ${totalDinheiro.toFixed(2).replace('.', ',')}`, 18, yPos);
                doc.setFont(undefined, 'normal');
                yPos += 10;
            }

            // Seção: Cestas Básicas
            if (doacoesCestas.length > 0) {
                if (yPos > 250) { // Nova página
                    doc.addPage();
                    yPos = 20;
                }

                doc.setFontSize(13);
                doc.setFont(undefined, 'bold');
                doc.text('DOACOES DE CESTAS BASICAS', 15, yPos);
                yPos += 8;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');

                doacoesCestas.forEach((doacao, index) => {
                    if (yPos > 270) {
                        doc.addPage();
                        yPos = 20;
                    }

                    const quantidade = `${doacao.quantidade} cesta${doacao.quantidade > 1 ? 's' : ''}`;
                    const nome = `${index + 1}. ${doacao.doador_nome}`;
                    
                    // Calcular espaço e adicionar pontos
                    const espacoDisponivel = 110;
                    const pontilhado = '.'.repeat(Math.max(0, Math.floor((espacoDisponivel - doc.getTextWidth(nome)) / doc.getTextWidth('.'))));
                    
                    doc.text(`${nome} ${pontilhado} ${quantidade}`, 18, yPos);
                    yPos += 5;

                    if (doacao.observacao) {
                        doc.setFont(undefined, 'italic');
                        const obs = doacao.observacao.substring(0, 60); // Limitar tamanho
                        doc.text(`   ${obs}`, 20, yPos);
                        doc.setFont(undefined, 'normal');
                        yPos += 5;
                    }
                });

                yPos += 3;
                doc.setFont(undefined, 'bold');
                doc.text(`Total de Cestas: ${totalCestas}`, 18, yPos);
                doc.setFont(undefined, 'normal');
                yPos += 10;
            }

            // Resumo Final
            if (yPos > 250) {
                doc.addPage();
                yPos = 20;
            }

            doc.setLineWidth(0.5);
            doc.line(15, yPos, 195, yPos);
            yPos += 7;

            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            doc.text('RESUMO GERAL', 15, yPos);
            yPos += 7;

            doc.setFontSize(10);
            doc.setFont(undefined, 'normal');
            doc.text(`Total de doações registradas: ${doacoesMes.length}`, 18, yPos);
            yPos += 6;
            doc.text(`Doações em dinheiro/PIX: ${doacoesDinheiro.length}`, 18, yPos);
            yPos += 6;
            doc.text(`Total arrecadado: R$ ${totalDinheiro.toFixed(2).replace('.', ',')}`, 18, yPos);
            yPos += 8;
            doc.text(`Doações de cestas básicas: ${doacoesCestas.length}`, 18, yPos);
            yPos += 6;
  doc.text(`Total de cestas: ${totalCestas} unidade${totalCestas !== 1 ? 's' : ''}`, 18, yPos);

            // Rodapé
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setFont(undefined, 'italic');
                doc.text(`Página ${i} de ${pageCount}`, 195, 290, { align: 'right' });
                doc.text('IEAD Coophamil - Sistema de Doações SBE', 105, 290, { align: 'center' });
            }

            // Salvar PDF
            const nomeMes = getNomeMes(mes);
            const sufixo = parcial ? '_parcial' : '_completo';
            const nomeArquivo = `doacoes_sbe_${nomeMes}_${ano}${sufixo}.pdf`;
            doc.save(nomeArquivo);
        }

        // Inicializar
        preencherSeletores();
        carregarDoacoes();
    </script>
</body>
</html>
