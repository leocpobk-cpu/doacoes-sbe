<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Doações - SBE</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 30px 20px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-left: 4px solid;
        }

        .card.total {
            border-color: #4caf50;
        }

        .card.mes {
            border-color: #2196f3;
        }

        .card.quantidade {
            border-color: #ff9800;
        }

        .card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .valor {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            margin: 10px 0;
        }

        .card.total .valor {
            color: #4caf50;
        }

        .card.mes .valor {
            color: #2196f3;
        }

        .card.quantidade .valor {
            color: #ff9800;
        }

        .lista-doacoes {
            list-style: none;
        }

        .doacao-item {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #4a90e2;
        }

        .doacao-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .doacao-numero {
            font-weight: 700;
            color: #4a90e2;
        }

        .doacao-data {
            color: #999;
            font-size: 0.9em;
        }

        .doacao-doador {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
            margin: 8px 0;
        }

        .doacao-tipo {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 5px;
        }

        .tipo-valor {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .tipo-pix {
            background: #b3e5fc;
            color: #01579b;
        }

        .tipo-cesta {
            background: #ffe0b2;
            color: #e65100;
        }

        .doacao-valor {
            font-size: 1.3em;
            font-weight: 700;
            color: #2e7d32;
            margin: 10px 0;
        }

        .btn-voltar {
            display: inline-block;
            padding: 12px 30px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: #555;
        }

        .section-title {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a90e2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Relatório de Doações - SBE</h1>
            <div class="subtitle">Sociedade Beneficente Evangélica - IEAD Coophamil</div>
        </div>

        <div class="content">
            <a href="index.html" class="btn-voltar">← Voltar para Registro</a>

            <!-- Cards de Estatísticas -->
            <div class="cards-container">
                <div class="card total">
                    <h3>Total Arrecadado em 2026</h3>
                    <div class="valor" id="totalGeral">R$ 0,00</div>
                </div>

                <div class="card mes">
                    <h3>Total deste Mês</h3>
                    <div class="valor" id="totalMes">R$ 0,00</div>
                </div>

                <div class="card quantidade">
                    <h3>Número de Doações</h3>
                    <div class="valor" id="totalDoacoes">0</div>
                </div>
            </div>

            <!-- Lista de Doações -->
            <h2 class="section-title">📋 Histórico Completo de Doações</h2>
            <div id="loadingDoacoes" class="loading">Carregando doações...</div>
            <ul class="lista-doacoes" id="listaDoacoes"></ul>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://fwmlimudntlrkeukvyjg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gx8_WdV2x6n9FoZooniJCQ_s0hWGsiW';
        const supabaseDB = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let doacoes = [];

        // Carregar doações do Supabase
        async function carregarDoacoes() {
            const loadingEl = document.getElementById('loadingDoacoes');
            loadingEl.style.display = 'block';

            try {
                const { data, error } = await supabaseDB
                    .from('doacoes_sbe')
                    .select('*')
                    .order('criado_em', { ascending: false });

                if (!error && data) {
                    doacoes = data;
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }

            loadingEl.style.display = 'none';
            atualizarEstatisticas();
            renderizarDoacoes();
        }

        function atualizarEstatisticas() {
            const anoAtual = new Date().getFullYear();
            const mesAtual = new Date().getMonth() + 1;

            const totalGeral = doacoes
                .filter(d => d.ano === anoAtual)
                .reduce((sum, d) => sum + (parseFloat(d.valor) || 0), 0);

            const totalMes = doacoes
                .filter(d => d.ano === anoAtual && d.mes === mesAtual)
                .reduce((sum, d) => sum + (parseFloat(d.valor) || 0), 0);

            document.getElementById('totalGeral').textContent = 'R$ ' + totalGeral.toFixed(2).replace('.', ',');
            document.getElementById('totalMes').textContent = 'R$ ' + totalMes.toFixed(2).replace('.', ',');
            document.getElementById('totalDoacoes').textContent = doacoes.filter(d => d.ano === anoAtual).length;
        }

        function renderizarDoacoes() {
            const listaDoacoes = document.getElementById('listaDoacoes');

            if (doacoes.length === 0) {
                listaDoacoes.innerHTML = '<li style="text-align: center; padding: 40px; color: #999;">Nenhuma doação registrada ainda.</li>';
                return;
            }

            listaDoacoes.innerHTML = '';

            doacoes.forEach(doacao => {
                const li = document.createElement('li');
                li.className = 'doacao-item';

                const data = new Date(doacao.criado_em).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const tipoLabel = {
                    'valor': 'Valor',
                    'pix': 'PIX',
                    'cesta_basica': 'Cesta Básica'
                }[doacao.tipo_doacao];

                const tipoClass = {
                    'valor': 'tipo-valor',
                    'pix': 'tipo-pix',
                    'cesta_basica': 'tipo-cesta'
                }[doacao.tipo_doacao];

                let valorDisplay = '';
                if (doacao.tipo_doacao === 'cesta_basica') {
                    valorDisplay = `${doacao.quantidade} Cesta${doacao.quantidade > 1 ? 's' : ''}`;
                } else {
                    valorDisplay = `R$ ${parseFloat(doacao.valor || 0).toFixed(2).replace('.', ',')}`;
                }

                li.innerHTML = `
                    <div class="doacao-header">
                        <div class="doacao-numero">Recibo Nº ${doacao.numero_recibo}</div>
                        <div class="doacao-data">${data}</div>
                    </div>
                    <div class="doacao-doador">${doacao.doador_nome}</div>
                    <span class="doacao-tipo ${tipoClass}">${tipoLabel}</span>
                    <div class="doacao-valor">${valorDisplay}</div>
                    ${doacao.referente_a ? `<div style="color: #666; margin: 5px 0;"><em>${doacao.referente_a}</em></div>` : ''}
                    ${doacao.observacao ? `<div style="color: #666; margin: 5px 0; font-size: 0.9em;">Obs: ${doacao.observacao}</div>` : ''}
                    ${doacao.imagem_comprovante ? `<div style="margin-top: 10px;"><img src="${doacao.imagem_comprovante}" style="max-width: 200px; border-radius: 5px; border: 1px solid #ddd;"></div>` : ''}
                `;

                listaDoacoes.appendChild(li);
            });
        }

        // Inicializar
        carregarDoacoes();
    </script>
</body>
</html>
